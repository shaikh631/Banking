<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Transfer Funds</title>
	<link rel="stylesheet" href="style.css">
</head>
<body data-theme="light" data-form-type="transfer">
	<div class="layout">
		<aside class="sidebar">
			<div class="sidebar-header">
				<span class="brand-icon" aria-hidden="true">
					<svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
						<path d="M3 11h18v10H3zm2 2v6h14v-6zm7-11 9 6v2H3V8z" />
					</svg>
				</span>
				<span class="brand-name">Nivida</span>
			</div>
			<nav class="nav-links">
				<a class="nav-link" href="index.html">
					<span class="nav-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24" focusable="false">
							<path d="M3 10.5 12 4l9 6.5V20a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1z" />
						</svg>
					</span>
					Dashboard
				</a>
				<a class="nav-link" href="withdraw.html">
					<span class="nav-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24" focusable="false">
							<path d="M12 2a5 5 0 0 1 5 5h-2a3 3 0 0 0-6 0h-2a5 5 0 0 1 5-5zm-7 9h14v11H5zm2 2v7h10v-7zm3.5 1.5v4h2v-4z" />
						</svg>
					</span>
					Withdraw
				</a>
				<a class="nav-link" href="deposit.html">
					<span class="nav-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24" focusable="false">
							<path d="M12 2a5 5 0 0 1 5 5h-2a3 3 0 0 0-6 0h-2a5 5 0 0 1 5-5zM5 10h14v11H5zm2 2v7h10v-7zm3-6h2v3h3v2h-3v3h-2v-3H9V9h3z" />
						</svg>
					</span>
					Deposit
				</a>
				<a class="nav-link active" href="transfer.html">
					<span class="nav-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24" focusable="false">
							<path d="M8 5h4V3l5 4-5 4V9H7V5zm8 10h-4v2l-5-4 5-4v2h5v4z" />
						</svg>
					</span>
					Transfer
				</a>
				<a class="nav-link" href="all-accounts.html">
					<span class="nav-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24" focusable="false">
							<path d="M4 5h16v14H4zm2 2v10h12V7zm1.5 2.5h3v3h-3zm5 0h3v3h-3zM7 15h10v2H7z" />
						</svg>
					</span>
					All Accounts
				</a>
				<a class="nav-link" href="settings.html">
					<span class="nav-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24" focusable="false">
							<path d="m12 2 1.9 2.6 3.1-.5.5 3.1L20 8l-2.6 1.9.5 3.1-3.1.5L12 18l-1.9-2.6-3.1.5-.5-3.1L4 8l2.6-1.9-.5-3.1 3.1.5zM12 10a2 2 0 1 0 .001 4.001A2 2 0 0 0 12 10z" />
						</svg>
					</span>
					Settings
				</a>
			</nav>
		</aside>

		<div class="main-region">


			<section class="form-shell">
				<div class="form-content">
					<section class="form-card" aria-labelledby="transfer-form-heading">
						<div>
							<h1 id="transfer-form-heading">Transfer money</h1>
							<p class="muted">Select the source and destination accounts then choose an amount to move.</p>
						</div>
						<form id="transfer-form" class="form-grid" autocomplete="off" novalidate>
							<label for="from-account-select">From account</label>
							<select id="from-account-select" required>
								<option value="">Select an account</option>
							</select>

							<label for="to-account-select">To account</label>
							<select id="to-account-select" required>
								<option value="">Select an account</option>
							</select>

							<div class="balance-row">
								<div class="balance-chip" role="status" aria-live="polite">
									<span>From balance</span>
									<strong id="from-account-balance">$0.00</strong>
								</div>
								<div class="balance-chip" role="status" aria-live="polite">
									<span>To balance</span>
									<strong id="to-account-balance">$0.00</strong>
								</div>
							</div>

							<label for="amount">Amount</label>
							<div class="input-with-prefix">
								<span>$</span>
								<input id="amount" name="amount" type="number" step="0.01" min="0.01" placeholder="0.00" required>
							</div>

							<div class="form-actions">
								<button type="submit" class="primary">Transfer</button>
								<button type="button" id="swap-accounts" class="icon-button" aria-label="Swap accounts">
									<svg viewBox="0 0 24 24" focusable="false">
										<path d="M7 7h8V5l4 4-4 4V9H7zm10 8H9v2l-4-4 4-4v2h8z" />
									</svg>
								</button>
							</div>
						</form>

					</section>

					<section class="form-card slim" aria-labelledby="recent-transfers-heading">
						<div class="chip">
							<svg viewBox="0 0 24 24" focusable="false">
								<path d="M5 4h14a1 1 0 0 1 1 1v14h-2v-5H6v5H4V5a1 1 0 0 1 1-1zm12 4H7v4h10zm-6 9h2v3h-2z" />
							</svg>
							Recent transfers
						</div>
						<ul id="transfer-history" class="transaction-list">
							<li class="empty-state">Select a source account to see transfer history.</li>
						</ul>
					</section>
				</div>
			</section>
		</div>
	</div>

	<div id="toast" class="toast hidden" role="status"></div>
	<script src="transfer-form.js"></script>
</body>
</html>
