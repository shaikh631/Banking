<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>All Accounts • Nivida</title>
	<link rel="stylesheet" href="style.css">
</head>
<body data-theme="light" data-page="all-accounts">
	<div class="layout">
		<aside class="sidebar">
			<div class="sidebar-header">
				<span class="brand-icon" aria-hidden="true">
					<svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
						<path d="M3 11h18v10H3zm2 2v6h14v-6zm7-11 9 6v2H3V8z" />
					</svg>
				</span>
				<span class="brand-name">Nivida</span>
			</div>
			<nav class="nav-links">
				<a class="nav-link" href="index.html">
					<span class="nav-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24" focusable="false">
							<path d="M3 10.5 12 4l9 6.5V20a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1z" />
						</svg>
					</span>
					Dashboard
				</a>
				<a class="nav-link" href="withdraw.html">
					<span class="nav-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24" focusable="false">
							<path d="M12 2a5 5 0 0 1 5 5h-2a3 3 0 0 0-6 0h-2a5 5 0 0 1 5-5zm-7 9h14v11H5zm2 2v7h10v-7zm3.5 1.5v4h2v-4z" />
						</svg>
					</span>
					Withdraw
				</a>
				<a class="nav-link" href="deposit.html">
					<span class="nav-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24" focusable="false">
							<path d="M12 2a5 5 0 0 1 5 5h-2a3 3 0 0 0-6 0h-2a5 5 0 0 1 5-5zM5 10h14v11H5zm2 2v7h10v-7zm3-6h2v3h3v2h-3v3h-2v-3H9V9h3z" />
						</svg>
					</span>
					Deposit
				</a>
				<a class="nav-link" href="transfer.html">
					<span class="nav-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24" focusable="false">
							<path d="M8 5h4V3l5 4-5 4V9H7V5zm8 10h-4v2l-5-4 5-4v2h5v4z" />
						</svg>
					</span>
					Transfer
				</a>
				<a class="nav-link active" href="all-accounts.html">
					<span class="nav-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24" focusable="false">
							<path d="M4 5h16v14H4zm2 2v10h12V7zm1.5 2.5h3v3h-3zm5 0h3v3h-3zM7 15h10v2H7z" />
						</svg>
					</span>
					All Accounts
				</a>
				<a class="nav-link" href="settings.html">
					<span class="nav-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24" focusable="false">
							<path d="m12 2 1.9 2.6 3.1-.5.5 3.1L20 8l-2.6 1.9.5 3.1-3.1.5L12 18l-1.9-2.6-3.1.5-.5-3.1L4 8l2.6-1.9-.5-3.1 3.1.5zM12 10a2 2 0 1 0 .001 4.001A2 2 0 0 0 12 10z" />
						</svg>
					</span>
					Settings
				</a>
			</nav>
		</aside>

		<div class="main-region">

			<section class="accounts-section">
				<div class="section-header">
					<div>
						<h2>Account overview</h2>
						<p class="muted small-text">Track balances and transaction totals for every customer.</p>
					</div>
					<div class="controls">
						<input id="accounts-filter" type="search" placeholder="Search by name or account">
						<button id="clear-accounts-filter" type="button" class="icon-button" aria-label="Clear search">
							<svg viewBox="0 0 24 24" focusable="false">
								<path d="m7 7 10 10m0-10-10 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
							</svg>
						</button>
					</div>
				</div>
				<div id="accounts-status" class="status"></div>
				<div class="table-wrapper">
					<table class="ledger-table">
						<thead>
							<tr>
								<th>Account No</th>
								<th>Account Holder</th>
								<th>Current Balance</th>
								<th>Total Deposited</th>
								<th>Deposits</th>
								<th>Total Withdrawn</th>
								<th>Withdrawals</th>
								<th>Last Updated</th>
							</tr>
						</thead>
						<tbody id="accounts-table-body">
							<tr>
								<td colspan="8" class="placeholder">Loading accounts...</td>
							</tr>
						</tbody>
					</table>
				</div>
			</section>
		</div>
	</div>

	<div id="toast" class="toast hidden" role="status"></div>
	<script src="all-accounts.js"></script>
</body>
</html>
